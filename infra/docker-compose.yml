services:
  db:
    image: postgres:16
    container_name: coalspark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coalspark
      POSTGRES_PASSWORD: coalspark_password
      POSTGRES_DB: coalspark
    ports:
      - "5432:5432"
    volumes:
      - coalspark_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  coalspark_pgdata:

